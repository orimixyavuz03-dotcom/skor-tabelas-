<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Halısaha Skor Tabelası — Retro Split-Flap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;700&family=Archivo+Narrow:wght@600;700&display=swap" rel="stylesheet">
<!-- Canlı Haberleşme Kütüphanesi -->
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
  :root {
    --casing: #14120E;
    --casing-2: #241F17;
    --tile: #EDE6D6;
    --ink: #1E1A14;
    --brass: #B8863B;
    --brass-light: #D9AE64;
    --lamp-red: #C24435;
    --paper: #F3EEE2;
    --muted: #8B8172;
    --team-a: #2FA84F;
    --team-b: #3B7DDB;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    background: transparent;
    font-family: 'Archivo Narrow', sans-serif;
    color: var(--paper);
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 10px;
    width: 100%;
    height: 100%;
  }

  .board {
    position: relative;
    width: 580px;
    background: linear-gradient(160deg, var(--casing-2), var(--casing));
    border-radius: 8px;
    padding: 14px 24px 16px;
    box-shadow: 0 18px 44px rgba(0,0,0,.55), inset 0 0 0 1px rgba(255,255,255,.05);
    z-index: 1;
  }

  .rivet {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, var(--brass-light), var(--brass) 60%, #6b4d20 100%);
    box-shadow: 0 1px 2px rgba(0,0,0,.6);
  }
  .rivet.tl { top: 10px; left: 10px; }
  .rivet.tr { top: 10px; right: 10px; }
  .rivet.bl { bottom: 10px; left: 10px; }
  .rivet.br { bottom: 10px; right: 10px; }

  .board-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 10px;
    margin-bottom: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }

  .lamp-unit { display: flex; align-items: center; gap: 7px; }
  .lamp {
    width: 11px; height: 11px;
    border-radius: 50%;
    background: #3a1512;
    border: 1.5px solid var(--brass);
    transition: background .3s ease;
  }
  .lamp.on {
    background: var(--lamp-red);
    box-shadow: 0 0 8px 2px rgba(194,68,53,.75);
  }
  .lamp-label {
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--brass-light);
    text-transform: uppercase;
  }

  .competition {
    font-weight: 600;
    font-size: 12.5px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .board-main {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .team { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
  .team-b { flex-direction: row-reverse; }

  .crest {
    width: 34px; height: 34px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(circle at 32% 28%, #2b2620, #100e0a);
    border: 2px solid var(--brass);
    box-shadow: 0 0 0 2px var(--team-a) inset;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700;
    font-size: 10px;
    color: var(--paper);
  }
  .team-b .crest { box-shadow: 0 0 0 2px var(--team-b) inset; }

  .name-wrap { min-width: 0; display: flex; flex-direction: column; }
  .team-b .name-wrap { align-items: flex-end; }
  .name {
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--paper);
  }
  .name-sub { font-size: 9.5px; letter-spacing: 1.5px; color: var(--muted); margin-top: 1px; }

  .tile-group { display: flex; gap: 3px; flex-shrink: 0; }

  .flap-tile {
    position: relative;
    width: 30px; height: 42px;
    border-radius: 3px;
    background: var(--tile);
    color: var(--ink);
    display: flex; align-items: center; justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700;
    font-size: 22px;
    box-shadow: 0 2px 5px rgba(0,0,0,.5);
  }

  .center {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    padding: 0 6px;
  }
  .clock-window {
    background: var(--tile);
    color: var(--ink);
    border-radius: 3px;
    padding: 6px 12px;
    box-shadow: 0 2px 5px rgba(0,0,0,.5);
  }
  .clock {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 1px;
  }

  .half-label {
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--brass-light);
    margin-top: 6px;
    text-transform: uppercase;
  }

  /* Control Panel */
  #controls {
    display: none;
    position: fixed;
    top: 140px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--casing);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 14px 16px;
    width: 580px;
    font-size: 13px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    z-index: 999;
  }
  #controls.visible { display: block; }

  .ctrl-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
  .ctrl-group { display: flex; align-items: center; gap: 8px; }
  button.btn {
    background: var(--casing-2);
    color: var(--paper);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 5px;
    padding: 5px 10px;
    font-weight: 600;
    cursor: pointer;
  }
  .status-badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 12px;
    background: #332b1d;
    color: var(--brass-light);
    margin-top: 6px;
    display: inline-block;
  }
</style>
</head>
<body>

  <div class="stage">
    <div class="board">
      <span class="rivet tl"></span><span class="rivet tr"></span>
      <span class="rivet bl"></span><span class="rivet br"></span>

      <div class="board-header">
        <div class="lamp-unit"><span class="lamp" id="lamp"></span><span class="lamp-label">Canlı</span></div>
        <div class="competition" id="competition">HALI SAHA LİGİ</div>
      </div>

      <div class="board-main">
        <div class="team team-a">
          <div class="crest" id="crestA">TA</div>
          <div class="name-wrap">
            <div class="name" id="nameA">EV SAHİBİ</div>
            <div class="name-sub">EV SAHİBİ</div>
          </div>
          <div class="tile-group">
            <div class="flap-tile" id="tA10">0</div>
            <div class="flap-tile" id="tA1">0</div>
          </div>
        </div>

        <div class="center">
          <div class="clock-window"><div class="clock" id="clock">00:00</div></div>
          <div class="half-label" id="halfLabel">1. YARI</div>
        </div>

        <div class="team team-b">
          <div class="crest" id="crestB">TB</div>
          <div class="name-wrap">
            <div class="name" id="nameB">DEPLASMAN</div>
            <div class="name-sub">DEPLASMAN</div>
          </div>
          <div class="tile-group">
            <div class="flap-tile" id="tB10">0</div>
            <div class="flap-tile" id="tB1">0</div>
          </div>
        </div>
      </div>
    </div>

    <div id="controls">
      <div class="ctrl-row">
        <div class="ctrl-group">
          <span>Takım A Skor:</span>
          <button class="btn" onclick="inc('a', -1)">-</button>
          <button class="btn" onclick="inc('a', 1)">+</button>
        </div>
        <div class="ctrl-group">
          <span>Takım B Skor:</span>
          <button class="btn" onclick="inc('b', -1)">-</button>
          <button class="btn" onclick="inc('b', 1)">+</button>
        </div>
      </div>
      <div class="ctrl-row">
        <button class="btn" onclick="toggleClock()">Başlat / Duraklat</button>
        <button class="btn" onclick="nextHalf()">Devre Değiştir</button>
      </div>
      <div style="text-align:center;">
        <span class="status-badge" id="netStatus">Bağlantı Kuruluyor...</span>
      </div>
    </div>
  </div>

<script>
  let state = {
    scoreA: 0, scoreB: 0,
    teamA: 'EV SAHİBİ', teamB: 'DEPLASMAN',
    time: 0, running: false, half: '1. YARI'
  };

  function pad(n) { return n < 10 ? '0' + n : '' + n; }

  function render() {
    document.getElementById('tA10').textContent = Math.floor(state.scoreA / 10);
    document.getElementById('tA1').textContent = state.scoreA % 10;
    document.getElementById('tB10').textContent = Math.floor(state.scoreB / 10);
    document.getElementById('tB1').textContent = state.scoreB % 10;

    document.getElementById('nameA').textContent = state.teamA;
    document.getElementById('nameB').textContent = state.teamB;
    document.getElementById('crestA').textContent = state.teamA.substring(0,2).toUpperCase();
    document.getElementById('crestB').textContent = state.teamB.substring(0,2).toUpperCase();

    const m = Math.floor(state.time / 60);
    const s = state.time % 60;
    document.getElementById('clock').textContent = pad(m) + ':' + pad(s);
    document.getElementById('halfLabel').textContent = state.half;
    document.getElementById('lamp').classList.toggle('on', state.running);
  }

  // PeerJS Bağlantı Mantığı (Sabit ID ile Eşleşme)
  const peer = new Peer('orimix-halisaha-scorebug-key-99');
  let activeConn = null;

  peer.on('open', (id) => {
    document.getElementById('netStatus').textContent = 'Yönetici Modu Aktif (Telefona Bağlanmaya Hazır)';
  });

  // Eğer bu ID doluysa (yani bu bilgisayarsa) telefon izleyici olarak bağlanır
  peer.on('error', (err) => {
    if (err.type === 'unavailable-id') {
      const receiverPeer = new Peer();
      receiverPeer.on('open', () => {
        document.getElementById('netStatus').textContent = 'Telefon Modu: Canlı Veri Bekleniyor...';
        const conn = receiverPeer.connect('orimix-halisaha-scorebug-key-99');
        conn.on('data', (data) => {
          state = data;
          render();
        });
        conn.on('open', () => {
          document.getElementById('netStatus').textContent = 'Yayına Bağlandı!';
        });
      });
    }
  });

  peer.on('connection', (conn) => {
    activeConn = conn;
    document.getElementById('netStatus').textContent = 'Telefon Yayına Bağlandı!';
    sendState();
  });

  function sendState() {
    if (activeConn && activeConn.open) {
      activeConn.send(state);
    }
  }

  function inc(team, val) {
    if (team === 'a') state.scoreA = Math.max(0, state.scoreA + val);
    if (team === 'b') state.scoreB = Math.max(0, state.scoreB + val);
    render(); sendState();
  }

  function toggleClock() { state.running = !state.running; render(); sendState(); }

  function nextHalf() {
    if (state.half === '1. YARI') { state.half = '2. YARI'; state.time = 25 * 60; }
    else { state.half = '1. YARI'; state.time = 0; }
    state.running = false;
    render(); sendState();
  }

  setInterval(() => {
    if (state.running) {
      state.time++;
      render();
      if (state.time % 2 === 0) sendState();
    }
  }, 1000);

  document.addEventListener('keydown', e => {
    if (e.key.toLowerCase() === 'c') {
      document.getElementById('controls').classList.toggle('visible');
    }
  });

  render();
</script>
</body>
</html>
